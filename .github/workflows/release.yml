name: Release

# On a version tag (v*), build the compiler on each platform, run the suite as
# a gate, then package the compiler with its bundled stdlib/runtime and attach
# it to the GitHub Release: a Windows .zip and a Linux .tar.gz. The one-line
# installers (install.sh / install.ps1) download these artifacts.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag/label for a manual package (no Release upload)"
        default: "manual"
        required: false

permissions:
  contents: write   # needed to create/attach the Release

jobs:
  package:
    name: Build & package (windows)
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Build + full suite (build.bat runs the gate); a tag must pass tests to ship.
      # METTLE_VERSION stamps the version into the binary (build.bat reads it);
      # on a tag push it is the tag, otherwise the manual-dispatch label.
      - name: Build and test
        shell: cmd
        # METTLE_NO_CODEVIEW avoids a MinGW gcc ICE in the CodeView emitter.
        env:
          METTLE_NO_CODEVIEW: "1"
          METTLE_VERSION: ${{ github.ref_type == 'tag' && github.ref_name || github.event.inputs.tag }}
        run: build.bat gcc

      - name: Stage release bundle
        id: stage
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          if ([string]::IsNullOrWhiteSpace($tag) -or $tag -eq 'development' -or $tag -eq 'main') {
            $tag = "${{ github.event.inputs.tag }}"
          }
          $out = "mettle-$tag-windows-x64"
          New-Item -ItemType Directory -Path $out | Out-Null
          Copy-Item bin\mettle.exe "$out\"
          Copy-Item -Recurse bin\stdlib "$out\stdlib"
          Copy-Item -Recurse bin\runtime "$out\runtime"
          if (Test-Path bin\mettle-build.bat) { Copy-Item bin\mettle-build.bat "$out\" }
          if (Test-Path LICENSE) { Copy-Item LICENSE "$out\" }
          if (Test-Path README.md) { Copy-Item README.md "$out\" }
          $zip = "$out.zip"
          Compress-Archive -Path "$out\*" -DestinationPath $zip -Force
          echo "zip=$zip" >> $env:GITHUB_OUTPUT
          Write-Host "Packaged $zip"

      # Build the GUI installer (Inno Setup) from the bundle build.bat produced.
      # ISCC ships on the windows-latest image; install it if the image changes.
      - name: Build GUI installer
        id: installer
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          if ([string]::IsNullOrWhiteSpace($tag) -or $tag -eq 'development' -or $tag -eq 'main') {
            $tag = "${{ github.event.inputs.tag }}"
          }
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) {
            choco install innosetup --no-progress -y
          }
          if (-not (Test-Path $iscc)) { $iscc = (Get-Command ISCC.exe).Source }
          # Inno expects a numeric-ish AppVersion; strip a leading 'v'.
          $ver = $tag -replace '^v',''
          & $iscc "/DMyAppVersion=$ver" installer\Mettle.iss
          $setup = "mettle-$tag-windows-x64-setup.exe"
          Copy-Item installer\out\Mettle-Setup.exe $setup -Force
          echo "setup=$setup" >> $env:GITHUB_OUTPUT
          Write-Host "Built $setup"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mettle-windows-x64
          path: |
            ${{ steps.stage.outputs.zip }}
            ${{ steps.installer.outputs.setup }}
          retention-days: 30

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.stage.outputs.zip }}
            ${{ steps.installer.outputs.setup }}
          generate_release_notes: true

  package-linux:
    name: Build & package (linux)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Build compiler
        run: |
          tag="${{ github.ref_name }}"
          if [ -z "$tag" ] || [ "$tag" = "development" ] || [ "$tag" = "main" ]; then
            tag="${{ github.event.inputs.tag }}"
          fi
          make -j"$(nproc)" EXTRA_CFLAGS="-DMETTLE_VERSION_RAW=$tag"

      - name: Native ELF backend tests
        run: bash tools/test-elf-native.sh

      - name: Stage release bundle
        id: stage
        shell: bash
        run: |
          tag="${{ github.ref_name }}"
          if [ -z "$tag" ] || [ "$tag" = "development" ] || [ "$tag" = "main" ]; then
            tag="${{ github.event.inputs.tag }}"
          fi
          out="mettle-$tag-linux-x64"
          mkdir -p "$out/bin"
          cp bin/mettle "$out/bin/"
          cp -r bin/stdlib "$out/stdlib"
          cp -r bin/runtime "$out/runtime"
          if [ -f LICENSE ]; then
            cp LICENSE "$out/"
          fi
          if [ -f README.md ]; then
            cp README.md "$out/"
          fi
          tar="$out.tar.gz"
          tar -czf "$tar" "$out"
          echo "tar=$tar" >> "$GITHUB_OUTPUT"
          echo "Packaged $tar"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.stage.outputs.tar }}
          path: ${{ steps.stage.outputs.tar }}
          retention-days: 30

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.stage.outputs.tar }}
          # Notes are generated once by the windows job; regenerating here would
          # append a duplicate auto-notes block to the release body.
          generate_release_notes: false
